<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>每日吃药打卡</title>
<style>
  :root {
    --primary: #4CAF50;
    --primary-light: #E8F5E9;
    --primary-dark: #388E3C;
    --danger: #E53935;
    --danger-light: #FFEBEE;
    --warning: #FF9800;
    --warning-light: #FFF3E0;
    --bg: #F5F7FA;
    --card: #FFFFFF;
    --text: #333333;
    --text-secondary: #666666;
    --text-light: #999999;
    --border: #E0E0E0;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --radius: 12px;
    --radius-sm: 8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5;
    padding: 0 0 80px 0; min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff; padding: 20px 16px; text-align: center;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(76,175,80,0.3);
  }
  .header h1 { font-size: 22px; font-weight: 600; letter-spacing: 1px; }
  .header .subtitle { font-size: 13px; opacity: 0.9; margin-top: 4px; }
  .banner {
    display: none; align-items: center; gap: 10px;
    background: var(--warning-light); color: #E65100;
    padding: 10px 16px; border-bottom: 1px solid #FFE0B2;
    font-size: 14px; font-weight: 500;
    cursor: pointer; position: relative;
  }
  .banner.show { display: flex; }
  .banner .banner-icon { font-size: 20px; flex-shrink: 0; }
  .banner .banner-close {
    margin-left: auto; font-size: 18px; cursor: pointer;
    opacity: 0.6; flex-shrink: 0; padding: 2px 6px;
  }
  .banner .banner-close:hover { opacity: 1; }
  .container { max-width: 600px; margin: 0 auto; padding: 16px; }
  .card {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 16px; font-weight: 600; color: var(--text);
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .card-title .badge {
    margin-left: auto; font-size: 12px; font-weight: 400;
    background: var(--primary-light); color: var(--primary-dark);
    padding: 2px 10px; border-radius: 20px;
  }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block; font-size: 13px; font-weight: 500;
    color: var(--text-secondary); margin-bottom: 4px;
  }
  .form-row { display: flex; gap: 10px; align-items: flex-start; }
  .form-row .form-group { flex: 1; }
  input[type="text"], input[type="time"], input[type="number"] {
    width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); font-size: 15px;
    outline: none; transition: border-color 0.2s;
    background: #FAFAFA; color: var(--text);
  }
  input:focus { border-color: var(--primary); background: #fff; }
  .time-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .time-item {
    display: flex; align-items: center; gap: 4px;
    background: var(--primary-light); border-radius: 6px; padding: 2px;
  }
  .time-item input[type="time"] {
    width: 100px; padding: 6px 8px; font-size: 14px;
    border: none; background: transparent; color: var(--text);
  }
  .time-item .remove-time {
    background: none; border: none; color: var(--danger);
    cursor: pointer; font-size: 18px; padding: 2px 6px;
    line-height: 1; border-radius: 4px;
  }
  .time-item .remove-time:hover { background: var(--danger-light); }
  .btn-add-time {
    background: none; border: 1.5px dashed var(--border);
    border-radius: 6px; padding: 6px 14px; font-size: 13px;
    color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
  }
  .btn-add-time:hover { border-color: var(--primary); color: var(--primary); }
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 6px; padding: 10px 20px; border: none; border-radius: var(--radius-sm);
    font-size: 15px; font-weight: 500; cursor: pointer;
    transition: all 0.2s; min-height: 44px;
  }
  .btn-primary { background: var(--primary); color: #fff; width: 100%; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-sm { padding: 6px 14px; font-size: 13px; min-height: 34px; }
  .btn-outline {
    background: transparent; border: 1.5px solid var(--border); color: var(--text);
  }
  .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
  .btn-danger-outline {
    background: transparent; border: 1.5px solid var(--danger); color: var(--danger);
  }
  .btn-danger-outline:hover { background: var(--danger-light); }
  .task-list { list-style: none; }
  .task-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 0; border-bottom: 1px solid var(--border);
  }
  .task-item:last-child { border-bottom: none; }
  .task-time {
    font-size: 20px; font-weight: 700; color: var(--primary-dark);
    min-width: 60px; text-align: center;
  }
  .task-info { flex: 1; }
  .task-name { font-size: 15px; font-weight: 500; }
  .task-dosage { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  .task-check {
    width: 44px; height: 44px; border-radius: 50%;
    border: 2.5px solid var(--border); background: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 22px; color: var(--primary);
    transition: all 0.2s; flex-shrink: 0;
  }
  .task-check:hover:not(:disabled) { border-color: var(--primary); background: var(--primary-light); }
  .task-check.done {
    border-color: var(--primary); background: var(--primary); color: #fff;
    cursor: default;
  }
  .task-check:disabled { cursor: default; }
  .drug-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .drug-item:last-child { border-bottom: none; }
  .drug-info { flex: 1; }
  .drug-name { font-weight: 500; font-size: 15px; }
  .drug-meta { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  .drug-times { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .drug-time-tag {
    font-size: 12px; background: #F0F0F0; color: var(--text-secondary);
    padding: 2px 8px; border-radius: 10px;
  }
  .drug-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .empty-state {
    text-align: center; padding: 30px 20px; color: var(--text-light);
  }
  .empty-state .empty-icon { font-size: 40px; margin-bottom: 10px; }
  .empty-state p { font-size: 14px; }
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 200;
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: var(--card); border-radius: var(--radius);
    padding: 24px; max-width: 420px; width: 100%;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  }
  .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-actions .btn { flex: 1; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #323232; color: #fff; padding: 12px 24px;
    border-radius: 24px; font-size: 14px; z-index: 300;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
    max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  @media (max-width: 480px) {
    .container { padding: 12px; }
    .card { padding: 16px; border-radius: 10px; }
    .task-time { font-size: 18px; min-width: 50px; }
    .header h1 { font-size: 20px; }
  }

  /* History */
  .history-summary {
    display: flex; gap: 16px; flex-wrap: wrap;
    padding: 12px 16px; background: var(--primary-light);
    border-radius: var(--radius-sm); margin-bottom: 16px;
  }
  .history-summary-item { text-align: center; flex: 1; min-width: 80px; }
  .history-summary-item .num {
    font-size: 28px; font-weight: 700; color: var(--primary-dark); display: block;
  }
  .history-summary-item .label {
    font-size: 12px; color: var(--text-secondary); margin-top: 2px;
  }
  .history-list { list-style: none; max-height: 400px; overflow-y: auto; }
  .history-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 6px; margin-bottom: 4px;
    font-size: 13px; transition: background 0.15s;
  }
  .history-item:hover { background: #F9F9F9; }
  .history-date { min-width: 90px; font-weight: 500; color: var(--text); }
  .history-weekday { font-size: 12px; color: var(--text-light); min-width: 36px; }
  .history-status {
    display: flex; gap: 4px; flex-wrap: wrap; flex: 1;
  }
  .history-pill {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 8px; border-radius: 10px; font-size: 11px;
  }
  .history-pill.done { background: var(--primary-light); color: var(--primary-dark); }
  .history-pill.miss { background: var(--danger-light); color: var(--danger); }
  .history-pill .h-time { font-weight: 600; }
  .history-empty { font-size: 12px; color: var(--text-light); font-style: italic; }
  .history-rate-bar {
    height: 6px; background: #E0E0E0; border-radius: 3px; overflow: hidden;
    margin-top: 4px;
  }
  .history-rate-fill {
    height: 100%; background: var(--primary); border-radius: 3px;
    transition: width 0.4s;
  }
</style>
</head>
<body>
<div class="header">
  <h1>💊 每日吃药打卡</h1>
  <div class="subtitle" id="todayDate"></div>
</div>
<div class="banner" id="reminderBanner">
  <span class="banner-icon">⏰</span>
  <span id="bannerText"></span>
  <span class="banner-close" id="bannerClose">✕</span>
</div>
<div class="container">
  <div class="card" id="addDrugCard">
    <div class="card-title">
      <span id="formTitle">➕ 添加药品</span>
      <span class="badge" id="formMode" style="display:none;">编辑中</span>
    </div>
    <div class="form-group">
      <label>药品名称</label>
      <input type="text" id="drugName" placeholder="例如：维生素C" maxlength="30">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>每次服用数量</label>
        <input type="text" id="drugDosage" placeholder="例如：1片 / 2粒" maxlength="20">
      </div>
    </div>
    <div class="form-group">
      <label>服用时间点</label>
      <div class="time-list" id="timeList">
        <div class="time-item">
          <input type="time" value="08:00">
        </div>
      </div>
      <button class="btn-add-time mt-8" id="addTimeBtn">＋ 添加时间点</button>
    </div>
    <button class="btn btn-primary mt-8" id="saveDrugBtn">添加药品</button>
  </div>
  <div class="card">
    <div class="card-title">
      📋 今日任务
      <span class="badge" id="taskCountBadge">0/0</span>
    </div>
    <ul class="task-list" id="taskList"></ul>
    <div class="empty-state" id="taskEmpty">
      <div class="empty-icon">✅</div>
      <p>今天没有待服用的药品，请先添加药品。</p>
    </div>
  </div>
  <div class="card" id="completedCard" style="display:none;">
    <div class="card-title">✅ 今日已完成</div>
    <ul class="task-list" id="completedList"></ul>
  </div>
    <div class="card" id="historyCard">
    <div class="card-title">📊 近一个月服药情况</div>
    <div id="historyContent"></div>
  </div>
  <div class="card">
    <div class="card-title">
      📂 药品管理
      <span class="badge" id="drugCount">0 种</span>
    </div>
    <div id="drugList"></div>
    <div class="empty-state" id="drugEmpty">
      <div class="empty-icon">💊</div>
      <p>还没有添加药品，请在上方添加。</p>
    </div>
  </div>
</div>
<div class="modal-overlay" id="confirmModal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">确认删除？</div>
    <p id="modalBody" style="color:var(--text-secondary);font-size:14px;"></p>
    <div class="modal-actions">
      <button class="btn btn-outline" id="modalCancel">取消</button>
      <button class="btn btn-danger-outline" id="modalConfirm">确认删除</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
(function() {
  'use strict';

  /* ========== DOM refs ========== */
  var $ = function(id) { return document.getElementById(id); };
  var todayDateEl = $('todayDate');
  var reminderBanner = $('reminderBanner');
  var bannerText = $('bannerText');
  var bannerClose = $('bannerClose');
  var drugName = $('drugName');
  var drugDosage = $('drugDosage');
  var timeList = $('timeList');
  var addTimeBtn = $('addTimeBtn');
  var saveDrugBtn = $('saveDrugBtn');
  var formTitle = $('formTitle');
  var formMode = $('formMode');
  var taskList = $('taskList');
  var taskEmpty = $('taskEmpty');
  var taskCountBadge = $('taskCountBadge');
  var completedCard = $('completedCard');
  var completedList = $('completedList');
  var drugListEl = $('drugList');
  var drugEmpty = $('drugEmpty');
  var drugCount = $('drugCount');
  var confirmModal = $('confirmModal');
  var modalTitle = $('modalTitle');
  var modalBody = $('modalBody');
  var modalCancel = $('modalCancel');
  var modalConfirm = $('modalConfirm');
  var toastEl = $('toast');

  /* ========== State ========== */
  var drugs = [];
  var checkins = {};
  var reminded = {};
  var todayStr = '';
  var editingDrugId = null;
  var confirmCallback = null;

  /* ========== Initialize ========== */
  function init() {
    loadData();
    var now = new Date();
    todayStr = formatDate(now);
    todayDateEl.textContent = todayStr + ' ' + getWeekday(now);

    var storedDate = localStorage.getItem('_lastDate');
    if (storedDate && storedDate !== todayStr) {
      // Clear old date records, keep drugs
      Object.keys(checkins).forEach(function(k) { if (k !== todayStr) delete checkins[k]; });
      Object.keys(reminded).forEach(function(k) { if (k !== todayStr) delete reminded[k]; });
      saveData();
    }
    if (!checkins[todayStr]) checkins[todayStr] = {};
    if (!reminded[todayStr]) reminded[todayStr] = {};
    localStorage.setItem('_lastDate', todayStr);

    renderAll();
    requestNotification();
    checkReminders();
    setInterval(checkReminders, 30000);
  }

  /* ========== Data ========== */
  function loadData() {
    try {
      var d = localStorage.getItem('_drugs');
      drugs = d ? JSON.parse(d) : [];
      var c = localStorage.getItem('_checkins');
      checkins = c ? JSON.parse(c) : {};
      var r = localStorage.getItem('_reminded');
      reminded = r ? JSON.parse(r) : {};
    } catch(e) { drugs = []; checkins = {}; reminded = {}; }
    if (drugs.length === 0) {
      drugs.push({ id: genId(), name: '维生素C', dosage: '1片', times: ['08:00', '20:00'] });
      drugs.push({ id: genId(), name: '阿莫西林', dosage: '2粒', times: ['12:30', '18:00'] });
      saveData();
    }
  }

  function saveData() {
    localStorage.setItem('_drugs', JSON.stringify(drugs));
    localStorage.setItem('_checkins', JSON.stringify(checkins));
    localStorage.setItem('_reminded', JSON.stringify(reminded));
  }

  function genId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  }

  function formatDate(d) {
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1).padStart(2, '0');
    var day = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
  }

  function getWeekday(d) {
    var wk = ['日','一','二','三','四','五','六'];
    return '星期' + wk[d.getDay()];
  }

  /* ========== Notification ========== */
  function requestNotification() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }

  function sendNotification(title, body) {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'granted') {
      try { new Notification(title, { body: body }); } catch(e) {}
    }
  }

  /* ========== Reminder Check ========== */
  function checkReminders() {
    if (!checkins[todayStr]) checkins[todayStr] = {};
    if (!reminded[todayStr]) reminded[todayStr] = {};

    var now = new Date();
    var currentMinutes = now.getHours() * 60 + now.getMinutes();

    drugs.forEach(function(drug) {
      drug.times.forEach(function(t) {
        var key = drug.id + '_' + t;
        if (checkins[todayStr][key]) return;
        if (reminded[todayStr][key]) return;

        var parts = t.split(':');
        var h = parseInt(parts[0], 10);
        var m = parseInt(parts[1], 10);
        var taskMinutes = h * 60 + m;
        var diff = Math.abs(currentMinutes - taskMinutes);

        if (diff <= 1) {
          reminded[todayStr][key] = true;
          saveData();
          var msg = '⏰ 该吃【' + drug.name + '】了，' + drug.dosage;
          sendNotification('吃药提醒', msg);
          showBanner(msg);
        }
      });
    });
  }

  function showBanner(text) {
    bannerText.textContent = text;
    reminderBanner.classList.add('show');
  }

  function hideBanner() {
    reminderBanner.classList.remove('show');
  }

  bannerClose.addEventListener('click', function(e) {
    e.stopPropagation();
    hideBanner();
  });

  /* ========== Toast ========== */
  var toastTimer = null;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function() {
      toastEl.classList.remove('show');
    }, 2500);
  }

  /* ========== Render ========== */
  function renderAll() {
    renderTaskList();
    renderDrugList();
    renderCompleted();
    renderHistory();
  }

  function renderTaskList() {
    var tasks = [];
    drugs.forEach(function(drug) {
      drug.times.forEach(function(t) {
        var key = drug.id + '_' + t;
        var done = !!(checkins[todayStr] && checkins[todayStr][key]);
        tasks.push({ drugId: drug.id, time: t, name: drug.name, dosage: drug.dosage, key: key, done: done });
      });
    });
    tasks.sort(function(a, b) { return a.time.localeCompare(b.time); });

    taskList.innerHTML = '';
    var total = tasks.length;
    var doneCount = tasks.filter(function(t) { return t.done; }).length;
    taskCountBadge.textContent = doneCount + '/' + total;

    if (total === 0) {
      taskEmpty.style.display = 'block';
      return;
    }
    taskEmpty.style.display = 'none';

    tasks.forEach(function(t) {
      var li = document.createElement('li');
      li.className = 'task-item';
      var timeSpan = document.createElement('span');
      timeSpan.className = 'task-time';
      timeSpan.textContent = t.time;
      var infoDiv = document.createElement('div');
      infoDiv.className = 'task-info';
      var nameDiv = document.createElement('div');
      nameDiv.className = 'task-name';
      nameDiv.textContent = t.name;
      var dosageDiv = document.createElement('div');
      dosageDiv.className = 'task-dosage';
      dosageDiv.textContent = t.dosage;
      infoDiv.appendChild(nameDiv);
      infoDiv.appendChild(dosageDiv);
      var checkBtn = document.createElement('button');
      checkBtn.className = 'task-check' + (t.done ? ' done' : '');
      checkBtn.textContent = t.done ? '✓' : '';
      checkBtn.disabled = t.done;
      if (!t.done) {
        (function(drugId, timeStr, key) {
          checkBtn.addEventListener('click', function() {
            if (!checkins[todayStr]) checkins[todayStr] = {};
            checkins[todayStr][key] = true;
            saveData();
            showToast('✅ 已打卡：' + getDrugName(drugId) + ' ' + timeStr);
            renderAll();
          });
        })(t.drugId, t.time, t.key);
      }
      li.appendChild(timeSpan);
      li.appendChild(infoDiv);
      li.appendChild(checkBtn);
      taskList.appendChild(li);
    });
  }

  function renderCompleted() {
    var tasks = [];
    drugs.forEach(function(drug) {
      drug.times.forEach(function(t) {
        var key = drug.id + '_' + t;
        if (checkins[todayStr] && checkins[todayStr][key]) {
          tasks.push({ time: t, name: drug.name, dosage: drug.dosage });
        }
      });
    });
    tasks.sort(function(a, b) { return a.time.localeCompare(b.time); });
    completedList.innerHTML = '';
    if (tasks.length === 0) {
      completedCard.style.display = 'none';
      return;
    }
    completedCard.style.display = 'block';
    tasks.forEach(function(t) {
      var li = document.createElement('li');
      li.className = 'task-item';
      var timeSpan = document.createElement('span');
      timeSpan.className = 'task-time';
      timeSpan.textContent = t.time;
      timeSpan.style.color = 'var(--text-secondary)';
      timeSpan.style.fontSize = '16px';
      var infoDiv = document.createElement('div');
      infoDiv.className = 'task-info';
      var nameDiv = document.createElement('div');
      nameDiv.className = 'task-name';
      nameDiv.textContent = t.name;
      var dosageDiv = document.createElement('div');
      dosageDiv.className = 'task-dosage';
      dosageDiv.textContent = t.dosage;
      infoDiv.appendChild(nameDiv);
      infoDiv.appendChild(dosageDiv);
      var doneIcon = document.createElement('span');
      doneIcon.textContent = '✓';
      doneIcon.style.cssText = 'color:var(--primary);font-size:20px;font-weight:bold;flex-shrink:0;';
      li.appendChild(timeSpan);
      li.appendChild(infoDiv);
      li.appendChild(doneIcon);
      completedList.appendChild(li);
    });
  }

  
  /* ========== History ========== */
  function renderHistory() {
    var el = document.getElementById('historyContent');
    if (!el) return;
    var now = new Date();
    var days = [];
    for (var i = 29; i >= 0; i--) {
      var d = new Date(now);
      d.setDate(d.getDate() - i);
      days.push(d);
    }

    // Calculate total expected tasks per day based on current drugs
    var totalExpectedPerDay = 0;
    drugs.forEach(function(drug) { totalExpectedPerDay += drug.times.length; });

    var totalDone = 0, totalExpected = 0;
    var itemsHtml = '';

    days.forEach(function(d) {
      var dateStr = formatDate(d);
      var wk = getWeekday(d);
      var dayData = checkins[dateStr] || {};
      var dayDrugs = {};

      // Collect all check-ins for this day
      Object.keys(dayData).forEach(function(key) {
        if (dayData[key]) {
          var parts = key.split('_');
          var drugId = parts[0];
          var timeStr = parts[1];
          if (!dayDrugs[drugId]) dayDrugs[drugId] = [];
          dayDrugs[drugId].push(timeStr);
        }
      });

      var dayDone = Object.keys(dayDrugs).reduce(function(sum, id) { return sum + dayDrugs[id].length; }, 0);
      var dayExpected = totalExpectedPerDay; // simplified: using current drugs

      // For past dates, we can only count what was recorded
      // Show check-ins if any
      var hasAny = Object.keys(dayData).length > 0;
      var statusHtml = '';
      if (hasAny) {
        Object.keys(dayDrugs).forEach(function(did) {
          var dName = getDrugName(did);
          dayDrugs[did].forEach(function(t) {
            statusHtml += '<span class="history-pill done"><span class="h-time">' + t + '</span> ' + dName + '</span>';
          });
        });
        totalDone += dayDone;
        totalExpected += dayDone; // count done items
      } else {
        statusHtml = '<span class="history-empty">无记录</span>';
      }

      var isToday = dateStr === todayStr;
      var rowClass = isToday ? ' style="background:var(--primary-light);border-radius:6px;"' : '';

      itemsHtml += '<li class="history-item"' + rowClass + '>' +
        '<span class="history-date">' + dateStr.slice(5) + '</span>' +
        '<span class="history-weekday">' + wk + '</span>' +
        '<span class="history-status">' + statusHtml + '</span>' +
        '</li>';
    });

    // Summary
    var rate = totalExpected > 0 ? Math.round(totalDone / totalExpected * 100) : 0;
    var summaryHtml = '<div class="history-summary">' +
      '<div class="history-summary-item"><span class="num">' + rate + '%</span><span class="label">打卡率</span></div>' +
      '<div class="history-summary-item"><span class="num">' + totalDone + '</span><span class="label">已完成</span></div>' +
      '<div class="history-summary-item"><span class="num">' + 30 + '</span><span class="label">统计天数</span></div>' +
      '</div>' +
      '<div class="history-rate-bar"><div class="history-rate-fill" style="width:' + rate + '%"></div></div>' +
      '<ul class="history-list" style="margin-top:12px;">' + itemsHtml + '</ul>';

    el.innerHTML = summaryHtml;
  }
function getDrugName(id) {
    var d = drugs.find(function(x) { return x.id === id; });
    return d ? d.name : '';
  }

  /* ========== Drug List ========== */
  function renderDrugList() {
    drugListEl.innerHTML = '';
    if (drugs.length === 0) {
      drugEmpty.style.display = 'block';
      drugCount.textContent = '0 种';
      return;
    }
    drugEmpty.style.display = 'none';
    drugCount.textContent = drugs.length + ' 种';

    drugs.forEach(function(drug) {
      var div = document.createElement('div');
      div.className = 'drug-item';
      var info = document.createElement('div');
      info.className = 'drug-info';
      var nameDiv = document.createElement('div');
      nameDiv.className = 'drug-name';
      nameDiv.textContent = drug.name;
      var metaDiv = document.createElement('div');
      metaDiv.className = 'drug-meta';
      metaDiv.textContent = '每次 ' + drug.dosage;
      var timesDiv = document.createElement('div');
      timesDiv.className = 'drug-times';
      drug.times.forEach(function(t) {
        var tag = document.createElement('span');
        tag.className = 'drug-time-tag';
        tag.textContent = t;
        timesDiv.appendChild(tag);
      });
      info.appendChild(nameDiv);
      info.appendChild(metaDiv);
      info.appendChild(timesDiv);
      var actions = document.createElement('div');
      actions.className = 'drug-actions';
      var editBtn = document.createElement('button');
      editBtn.className = 'btn btn-sm btn-outline';
      editBtn.textContent = '编辑';
      (function(id) {
        editBtn.addEventListener('click', function() { startEdit(id); });
      })(drug.id);
      var delBtn = document.createElement('button');
      delBtn.className = 'btn btn-sm btn-danger-outline';
      delBtn.textContent = '删除';
      (function(id, name) {
        delBtn.addEventListener('click', function() { confirmDelete(id, name); });
      })(drug.id, drug.name);
      actions.appendChild(editBtn);
      actions.appendChild(delBtn);
      div.appendChild(info);
      div.appendChild(actions);
      drugListEl.appendChild(div);
    });
  }

  /* ========== Add / Edit Drug ========== */
  function resetForm() {
    drugName.value = '';
    drugDosage.value = '';
    timeList.innerHTML = '<div class="time-item"><input type="time" value="08:00"></div>';
    editingDrugId = null;
    formTitle.textContent = '➕ 添加药品';
    formMode.style.display = 'none';
    saveDrugBtn.textContent = '添加药品';
  }

  function startEdit(id) {
    var drug = drugs.find(function(d) { return d.id === id; });
    if (!drug) return;
    editingDrugId = id;
    drugName.value = drug.name;
    drugDosage.value = drug.dosage;
    timeList.innerHTML = '';
    drug.times.forEach(function(t) { addTimeInput(t); });
    formTitle.textContent = '✏️ 编辑药品';
    formMode.style.display = 'inline';
    saveDrugBtn.textContent = '保存修改';
    document.getElementById('addDrugCard').scrollIntoView({ behavior: 'smooth' });
  }

  function addTimeInput(val) {
    var div = document.createElement('div');
    div.className = 'time-item';
    var inp = document.createElement('input');
    inp.type = 'time';
    inp.value = val || '08:00';
    var rmBtn = document.createElement('button');
    rmBtn.className = 'remove-time';
    rmBtn.textContent = '×';
    rmBtn.type = 'button';
    rmBtn.addEventListener('click', function() { div.remove(); });
    div.appendChild(inp);
    div.appendChild(rmBtn);
    timeList.appendChild(div);
  }

  addTimeBtn.addEventListener('click', function() {
    addTimeInput('08:00');
  });

  saveDrugBtn.addEventListener('click', function() {
    var name = drugName.value.trim();
    var dosage = drugDosage.value.trim();
    var timeInputs = timeList.querySelectorAll('input[type="time"]');
    var times = [];
    timeInputs.forEach(function(inp) {
      if (inp.value) times.push(inp.value);
    });
    times = times.filter(function(v, i, a) { return a.indexOf(v) === i; });
    times.sort();

    if (!name) { showToast('⚠️ 请输入药品名称'); return; }
    if (!dosage) { showToast('⚠️ 请输入服用数量'); return; }
    if (times.length === 0) { showToast('⚠️ 请至少添加一个服用时间点'); return; }

    if (editingDrugId) {
      var idx = drugs.findIndex(function(d) { return d.id === editingDrugId; });
      if (idx !== -1) {
        drugs[idx].name = name;
        drugs[idx].dosage = dosage;
        drugs[idx].times = times;
        showToast('✅ 已更新：' + name);
      }
    } else {
      drugs.push({ id: genId(), name: name, dosage: dosage, times: times });
      showToast('✅ 已添加：' + name);
    }
    saveData();
    resetForm();
    renderAll();
  });

  /* ========== Delete ========== */
  function confirmDelete(id, name) {
    confirmModal.classList.add('show');
    modalTitle.textContent = '确认删除？';
    modalBody.textContent = '确定要删除药品「' + name + '」及其所有打卡记录吗？';
    confirmCallback = function() {
      drugs = drugs.filter(function(d) { return d.id !== id; });
      Object.keys(checkins).forEach(function(date) {
        Object.keys(checkins[date]).forEach(function(key) {
          if (key.startsWith(id + '_')) delete checkins[date][key];
        });
      });
      Object.keys(reminded).forEach(function(date) {
        Object.keys(reminded[date]).forEach(function(key) {
          if (key.startsWith(id + '_')) delete reminded[date][key];
        });
      });
      saveData();
      resetForm();
      renderAll();
      showToast('🗑️ 已删除：' + name);
    };
  }

  modalCancel.addEventListener('click', function() {
    confirmModal.classList.remove('show');
    confirmCallback = null;
  });

  modalConfirm.addEventListener('click', function() {
    confirmModal.classList.remove('show');
    if (confirmCallback) { confirmCallback(); confirmCallback = null; }
  });

  confirmModal.addEventListener('click', function(e) {
    if (e.target === confirmModal) {
      confirmModal.classList.remove('show');
      confirmCallback = null;
    }
  });

  /* ========== Keyboard shortcut ========== */
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && document.activeElement && document.activeElement.tagName === 'INPUT') {
      if (!confirmModal.classList.contains('show')) {
        saveDrugBtn.click();
      }
    }
  });

  init();
})();
</script>
